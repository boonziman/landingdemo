<!-- ============================== -->
<!-- Site Header / Navigation       -->
<!-- ============================== -->
<div class="relative flex h-auto w-full flex-col bg-transparent z-50">
  <div class="layout-container flex grow flex-col">
    <div class="px-6 md:px-12 flex flex-1 justify-center py-5">
      <div class="layout-content-container flex flex-col w-full max-w-[1200px] flex-1">
        <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-dark/50 px-0 py-4">
          <!-- Logo -->
          <a href="{{ "/" | relURL }}" class="flex items-center gap-3 text-white group no-underline">
            <div class="size-6 text-primary transition-transform group-hover:scale-110 duration-300">
              <svg aria-hidden="true" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path clip-rule="evenodd" d="M24 4H6V17.3333V30.6667H24V44H42V30.6667V17.3333H24V4Z" fill="currentColor" fill-rule="evenodd"></path>
              </svg>
            </div>
            <span class="text-white text-xl font-bold tracking-tight font-heading">Synapse AI</span>
          </a>
          <!-- Desktop Navigation -->
          <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-muted">
            {{ range .Site.Menus.main }}
              <a class="hover:text-white transition-colors font-body" href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
          </nav>
          <!-- Auth Buttons -->
          <div class="flex items-center gap-4">
            <a class="text-sm font-medium text-white hover:text-primary transition-colors hidden sm:block font-body" href="{{ "signup/" | relURL }}">Log in</a>
            <a href="{{ "signup/" | relURL }}" class="flex cursor-pointer items-center justify-center overflow-hidden rounded-[4px] h-8 px-3 md:h-10 md:px-5 bg-primary text-[#050914] text-xs md:text-sm font-bold leading-normal transition-all hover:shadow-glow-primary font-body no-underline">
              <span class="hidden sm:inline">Start Building Free</span>
              <span class="sm:hidden">Get Started</span>
            </a>
          </div>
          <!-- Mobile Menu Button -->
          <button id="mobile-menu-toggle" class="md:hidden flex items-center justify-center text-white p-2" aria-label="Toggle navigation menu">
            <span class="material-symbols-outlined text-2xl">menu</span>
          </button>
        </header>
        <!-- Mobile Navigation Dropdown -->
        <nav id="mobile-menu" class="hidden md:hidden flex-col gap-4 py-6 border-b border-border-dark/50 animate-fade-in-up">
          {{ range .Site.Menus.main }}
            <a class="block text-muted hover:text-white transition-colors font-body text-base py-2" href="{{ .URL }}">{{ .Name }}</a>
          {{ end }}
          <a href="{{ "signup/" | relURL }}" class="block mt-2 text-center rounded-[4px] h-12 px-5 bg-primary text-[#050914] text-sm font-bold leading-normal transition-all hover:shadow-glow-primary font-body no-underline flex items-center justify-center">
            Start Building Free
          </a>
        </nav>
      </div>
    </div>
  </div>
</div>
